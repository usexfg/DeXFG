name: DEXFG CI

on:
  push:
    branches: [main]
    paths:
      - 'swapxfgui/**'
      - 'mm2src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - '.github/workflows/dexfg.yml'
  pull_request:
    branches: [main]
    paths:
      - 'swapxfgui/**'
      - 'mm2src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'

concurrency:
  group: dexfg-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mm2:
    name: Build mm2_xfg
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: nightly-2025-06-01
          components: rustfmt, clippy

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: mm2-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}

      - name: Build mm2_xfg
        run: |
          rustup override set nightly-2025-06-01
          cargo build --release -p mm2_bin_lib
          cp target/release/kdf mm2_xfg

      - uses: actions/upload-artifact@v4
        with:
          name: mm2_xfg-linux-x64
          path: mm2_xfg

  swapxfgui:
    name: Build swapxfgui
    needs: mm2
    runs-on: ubuntu-20.04
    env:
      DEX_PROJECT_NAME: "deXFG"
      DEX_VERSION: "0.7.0"
      QT_VERSION: "5.15.2"
      VCPKG_DEFAULT_TRIPLET: x64-linux
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/download-artifact@v4
        with:
          name: mm2_xfg-linux-x64
          path: /tmp/mm2_artifacts

      - name: Install Nim
        run: |
          curl https://nim-lang.org/choosenim/init.sh -sSf | bash -s -- -y
          echo "$HOME/.nimble/bin" >> $GITHUB_PATH

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: desktop
          dir: ${{ github.workspace }}
          modules: 'qtcharts debug_info'
          cache: true

      - name: Install deps
        env:
          DEBIAN_FRONTEND: noninteractive
        run: sudo ./swapxfgui/ci_tools_atomic_dex/ci_scripts/linux_script.sh

      - name: Set vcpkg env
        run: |
          echo "VCPKG_ROOT=${{ github.workspace }}/swapxfgui/ci_tools_atomic_dex/vcpkg-repo" >> $GITHUB_ENV

      - name: Build ci_tools
        working-directory: swapxfgui/ci_tools_atomic_dex
        run: nimble build -y

      - name: Prepare mm2 binary
        run: |
          cp /tmp/mm2_artifacts/mm2_xfg /tmp/mm2_xfg_bin
          chmod +x /tmp/mm2_xfg_bin

      - name: Build swapxfgui
        working-directory: swapxfgui/ci_tools_atomic_dex
        env:
          QT_INSTALL_CMAKE_PATH: ${{ github.workspace }}/Qt/${{ env.QT_VERSION }}/gcc_64/lib/cmake
          QT_ROOT: ${{ github.workspace }}/Qt/${{ env.QT_VERSION }}
          CXX: clang++-12
          CC: clang-12
        run: |
          export PATH=$HOME/.nimble/bin:$PATH
          ./ci_tools_atomic_dex build Release

      - name: Override mm2 binary
        run: |
          find swapxfgui/ci_tools_atomic_dex/build-Release -name "atomic_qt" -o -name "deXFG" -o -name "swapxfg" 2>/dev/null
          find swapxfgui/ci_tools_atomic_dex/build-Release -path "*/tools/mm2/*" 2>/dev/null
          for f in $(find swapxfgui/ci_tools_atomic_dex/build-Release -path "*/tools/mm2/mm2*" -type f 2>/dev/null); do
            cp /tmp/mm2_xfg_bin "$f"
            chmod +x "$f"
          done

      - name: Bundle
        working-directory: swapxfgui/ci_tools_atomic_dex
        env:
          QT_INSTALL_CMAKE_PATH: ${{ github.workspace }}/Qt/${{ env.QT_VERSION }}/gcc_64/lib/cmake
          QT_ROOT: ${{ github.workspace }}/Qt/${{ env.QT_VERSION }}
          CXX: clang++-12
          CC: clang-12
        run: |
          export PATH=$HOME/.nimble/bin:$PATH
          ./ci_tools_atomic_dex bundle Release

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: swapxfgui-linux-x64
          path: swapxfgui/ci_tools_atomic_dex/bundle-Release/

  fuego_adaptor_tests:
    name: fuego_adaptor tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: nightly-2025-06-01
          components: rustfmt, clippy

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: mm2-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}

      - name: Run fuego_adaptor tests
        run: |
          rustup override set nightly-2025-06-01
          cargo test -p fuego_adaptor
